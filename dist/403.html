<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>403 - Access Forbidden | Lenzorah</title>
    <style>
      body {
        background-color: #0d0d0d;
        color: #ffffff;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .container {
        max-width: 600px;
      }
      h1 {
        font-size: 8rem;
        margin: 0;
        background: linear-gradient(90deg, #ffcc00, #ff9900);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
      }
      h2 {
        font-size: 2rem;
        margin-top: 10px;
        font-weight: 700;
      }
      p {
        font-size: 1.1rem;
        color: #a0a0a0;
        margin: 20px 0 40px;
        line-height: 1.6;
      }
      a {
        text-decoration: none;
        background-color: #e50914;
        color: white;
        padding: 14px 28px;
        border-radius: 4px;
        font-weight: 600;
        transition:
          background-color 0.3s ease,
          transform 0.2s ease;
        display: inline-block;
      }
      a:hover {
        background-color: #b20710;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>403</h1>
      <h2>Access Forbidden</h2>
      <p>
        You don't have permission to access this resource or directory. Please
        make sure you have the correct credentials or return home.
      </p>
      <a href="/">Go to Homepage</a>
    </div>
  </body>
</html>
