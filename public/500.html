<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>500 - Internal Server Error | Lenzorah</title>
    <style>
      body {
        background-color: #0d0d0d;
        color: #ffffff;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }
      h1 {
        font-size: 6rem;
        margin: 0;
        background: linear-gradient(90deg, #ff3b3b, #ff0000);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        font-size: 1.2rem;
        color: #a0a0a0;
        max-width: 500px;
        margin: 20px 0 40px;
      }
      a {
        text-decoration: none;
        background-color: #e50914;
        color: white;
        padding: 12px 24px;
        border-radius: 4px;
        font-weight: 600;
        transition: background-color 0.3s ease;
      }
      a:hover {
        background-color: #b20710;
      }
    </style>
  </head>
  <body>
    <h1>500</h1>
    <h2>Internal Server Error</h2>
    <p>
      Oops, something went wrong on our end. We are currently trying to fix the
      issue. Please check back later.
    </p>
    <a href="/">Go to Homepage</a>
  </body>
</html>
