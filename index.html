<!doctype html>
<html lang="en">
  <head>
    <!-- Primary Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Title -->
    <title>%VITE_SEO_TITLE%</title>

    <!-- SEO -->
    <meta
      name="description"
      content="%VITE_SEO_DESCRIPTION%"
    />

    <meta
      name="keywords"
      content="%VITE_SEO_KEYWORDS%"
    />

    <meta name="author" content="%VITE_APP_AUTHOR%" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="%VITE_THEME_COLOR%" />

    <!-- Open Graph -->
    <meta property="og:title" content="%VITE_SEO_TITLE%" />
    <meta property="og:description" content="%VITE_SEO_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="%VITE_APP_AUTHOR%" />

    <!-- Twitter -->
    <meta name="twitter:title" content="%VITE_SEO_TITLE%" />
    <meta name="twitter:description" content="%VITE_SEO_DESCRIPTION%" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-black text-white antialiased">
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
