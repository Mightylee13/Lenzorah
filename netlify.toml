[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# API proxy — handled by netlify/functions/api-proxy.mjs via config.path
# The function intercepts /api/v2/* before the SPA catch-all below.

# SPA fallback: serve index.html for all client-side routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
